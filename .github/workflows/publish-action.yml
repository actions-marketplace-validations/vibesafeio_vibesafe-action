name: Publish Action Docker Image

on:
  push:
    tags:
      - "v*"          # v1.0.0, v1 등 태그 push 시 빌드
  workflow_dispatch:  # 수동 트리거

permissions:
  contents: read
  packages: write     # GHCR push 권한

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Validate ruleset packs
        # 존재하지 않는 팩(p/nodejs-security 등)이 재진입하면 여기서 차단됨
        run: python tools/scanner/domain_rule_engine.py --validate

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vibesafe/vibesafe-action
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.action
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
