<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSafe — Is your AI-built app safe?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 640px;
            width: 100%;
            padding: 60px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 12px;
        }
        .subtitle {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        @media (max-width: 480px) {
            .input-group { flex-direction: column; }
            h1 { font-size: 1.5rem; }
            .severity-row { flex-wrap: wrap; gap: 8px; }
        }
        input[type="url"] {
            flex: 1;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            outline: none;
        }
        input[type="url"]:focus { border-color: #4ade80; }
        input[type="url"]::placeholder { color: #555; }
        button {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: #4ade80;
            color: #000;
            cursor: pointer;
            white-space: nowrap;
        }
        button:hover { background: #22c55e; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .hint { color: #555; font-size: 0.85rem; margin-bottom: 40px; }

        /* Results */
        #results { display: none; margin-top: 40px; text-align: left; }
        .grade-box {
            text-align: center;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .grade-box.good { background: #052e16; border: 1px solid #166534; }
        .grade-box.warn { background: #422006; border: 1px solid #854d0e; }
        .grade-box.bad { background: #450a0a; border: 1px solid #991b1b; }
        .grade-letter { font-size: 3rem; font-weight: 800; }
        .grade-score { font-size: 1.2rem; color: #aaa; }
        .grade-label { color: #888; margin-top: 4px; }

        .severity-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 16px;
            background: #111;
            border-radius: 8px;
        }
        .severity-item { text-align: center; }
        .severity-count { font-size: 1.5rem; font-weight: 700; }
        .severity-label { font-size: 0.8rem; color: #888; }

        .finding {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: #111;
            border-radius: 8px;
            border-left: 3px solid #666;
        }
        .finding.critical { border-left-color: #ef4444; }
        .finding.high { border-left-color: #f97316; }
        .finding.medium { border-left-color: #eab308; }
        .finding.low { border-left-color: #22c55e; }
        .finding-header { font-weight: 600; margin-bottom: 4px; }
        .finding-file { color: #888; font-size: 0.85rem; font-family: monospace; }
        .finding-fix { color: #4ade80; font-size: 0.9rem; margin-top: 6px; }

        .ai-prompt {
            margin-top: 24px;
            padding: 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .ai-prompt h3 { margin-bottom: 8px; font-size: 1rem; }
        .ai-prompt pre {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            color: #ccc;
        }
        .copy-btn {
            margin-top: 8px;
            padding: 8px 16px;
            font-size: 0.85rem;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .copy-btn:hover { background: #444; }

        .scanning {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        .scanning canvas {
            image-rendering: pixelated;
            margin-bottom: 8px;
        }
        .scan-dots { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
        .scan-dot { width: 6px; height: 6px; background: #333; }

        .stats {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #222;
            color: #555;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Is your AI-built app safe?</h1>
        <p class="subtitle">
            Paste your GitHub repo URL. Find out in 30 seconds.<br>
            Free. No signup. No install.
        </p>

        <div class="input-group">
            <input type="url" id="repoUrl" placeholder="https://github.com/your/repo" />
            <button id="scanBtn" onclick="startScan()">Scan</button>
        </div>
        <p class="hint">Public GitHub repos only. Your code stays on our server only during the scan.</p>

        <div id="scanning" class="scanning" style="display:none">
            <canvas id="wombatCanvas" width="360" height="160"></canvas>
            <div class="scan-dots" id="scanDots"></div>
            <p id="scanStatus" style="font-family:monospace; letter-spacing:1px; margin-top:10px;">Digging for vulnerabilities...</p>
            <p style="color:#555; font-size:0.75rem; margin-top:4px;">Usually takes 20-40 seconds</p>
        </div>

        <div id="results"></div>
    </div>

    <script>
        let pollTimer = null;

        async function startScan() {
            let url = document.getElementById('repoUrl').value.trim();
            // Normalize for beginners
            url = url.replace(/\/+$/, '');
            if (url.startsWith('github.com/')) url = 'https://' + url;
            ['/tree/main', '/tree/master'].forEach(s => {
                const idx = url.indexOf(s);
                if (idx > 0) url = url.substring(0, idx);
            });
            if (url.endsWith('.git')) url = url.slice(0, -4);
            document.getElementById('repoUrl').value = url;

            if (!url.startsWith('https://github.com/')) {
                alert('Please enter a GitHub URL (e.g. github.com/your/repo)');
                return;
            }

            document.getElementById('scanBtn').disabled = true;
            document.getElementById('scanning').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            startWombat();

            try {
                const res = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                });
                const data = await res.json();
                if (data.error) {
                    showError(data.error);
                    return;
                }
                pollForResults(data.id);
            } catch (e) {
                showError('Failed to start scan. Please try again.');
            }
        }

        function pollForResults(scanId) {
            let pollCount = 0;
            const stages = [
                'Downloading your code...',
                'Detecting tech stack...',
                'Scanning for vulnerabilities...',
                'Checking accessibility...',
                'Calculating score...',
                'Still working... large repos take longer.',
            ];
            pollTimer = setInterval(async () => {
                pollCount++;
                const stageIdx = Math.min(Math.floor(pollCount / 3), stages.length - 1);
                document.getElementById('scanStatus').textContent = stages[stageIdx];
                try {
                    const res = await fetch(`/api/scan/status?id=${scanId}`);
                    const data = await res.json();
                    if (data.status === 'done') {
                        clearInterval(pollTimer);
                        showResults(data.results);
                    } else if (data.status === 'error') {
                        clearInterval(pollTimer);
                        showError(data.error || 'Scan failed');
                    }
                } catch (e) {
                    clearInterval(pollTimer);
                    showError('Connection lost');
                }
            }, 2000);
        }

        function showResults(results) {
            stopWombat();
            document.getElementById('scanning').style.display = 'none';
            document.getElementById('scanBtn').disabled = false;

            const score = results.score || {};
            const grade = score.grade || '?';
            const points = score.score ?? '?';
            const critical = score.critical || 0;
            const high = score.high || 0;
            const medium = score.medium || 0;
            const low = score.low || 0;

            const gradeClass = points >= 85 ? 'good' : points >= 50 ? 'warn' : 'bad';

            let html = `
                <div class="grade-box ${gradeClass}">
                    <div class="grade-letter">${grade}</div>
                    <div class="grade-score">${points}/100</div>
                    <div class="grade-label">${score.grade_label || ''}</div>
                </div>
                <div class="severity-row">
                    <div class="severity-item">
                        <div class="severity-count" style="color:#ef4444">${critical}</div>
                        <div class="severity-label">Critical</div>
                    </div>
                    <div class="severity-item">
                        <div class="severity-count" style="color:#f97316">${high}</div>
                        <div class="severity-label">High</div>
                    </div>
                    <div class="severity-item">
                        <div class="severity-count" style="color:#eab308">${medium}</div>
                        <div class="severity-label">Medium</div>
                    </div>
                    <div class="severity-item">
                        <div class="severity-count" style="color:#22c55e">${low}</div>
                        <div class="severity-label">Low</div>
                    </div>
                </div>
            `;

            // Collect findings from SAST + secrets
            const findings = [];
            if (results.sast && results.sast.findings) {
                results.sast.findings.forEach(f => findings.push(f));
            }
            if (results.secrets && results.secrets.secrets) {
                results.secrets.secrets.forEach(s => findings.push({
                    severity: 'critical',
                    rule_id: s.type || 'hardcoded-secret',
                    file: s.file || '',
                    line: s.line || 0,
                    message: s.description || 'Hardcoded secret detected',
                }));
            }

            if (findings.length === 0) {
                const stack = results.stack || {};
                const detected = stack.detected_stack || [];
                const langs = stack.languages || [];
                const domain = results.domain || 'auto';

                let checkedList = 'SQL injection, XSS, hardcoded secrets, accessibility violations';
                if (detected.length > 0) {
                    checkedList += `, ${detected.join('/')} security patterns`;
                }

                html += `
                    <div style="text-align:center; padding:24px; background:#052e16; border:1px solid #166534; border-radius:12px; margin-bottom:24px;">
                        <div style="font-size:2rem; margin-bottom:8px;">Your app looks safe!</div>
                        <p style="color:#86efac;">We checked for ${checkedList} — nothing found.</p>
                        ${langs.length > 0 ? '<p style="color:#666; margin-top:8px; font-size:0.85rem;">Scanned: ' + langs.join(', ') + (detected.length > 0 ? ' (' + detected.join(', ') + ')' : '') + '</p>' : ''}
                        <p style="color:#666; margin-top:12px; font-size:0.9rem;">Want this on every code change? <a href="#" onclick="trackInstall();window.open(getInstallUrl())" style="color:#4ade80;">Add VibeSafe to your repo (one click)</a></p>
                    </div>
                `;
            }

            // AI Fix Prompt FIRST — this is what beginners need most
            if (findings.length > 0) {
                const prompt = 'Fix these security and accessibility issues in my code:\n' +
                    findings.slice(0, 20).map(f =>
                        `- ${(f.severity || 'MEDIUM').toUpperCase()}: ${f.file || ''}${f.line ? ':' + f.line : ''} — ${f.message || f.rule_id || ''}`
                    ).join('\n');

                html += `
                    <div class="ai-prompt" style="margin-bottom:24px; border-color:#4ade80;">
                        <h3 style="color:#4ade80;">How to fix: copy this and paste into your AI</h3>
                        <p style="color:#888; font-size:0.85rem; margin-bottom:8px;">Works with Cursor, Claude, ChatGPT, or any AI coding tool.</p>
                        <pre id="promptText">${prompt}</pre>
                        <button class="copy-btn" onclick="copyPrompt()" style="background:#4ade80; color:#000; font-weight:600;">Copy to clipboard</button>
                    </div>
                `;
            }

            // Then show details
            if (findings.length > 0) {
                html += '<h3 style="margin-bottom:12px; color:#888; font-size:0.95rem;">Details (' + findings.length + (results.sast.total > 50 ? ' of ' + results.sast.total : '') + ' issues)</h3>';
                findings.slice(0, 20).forEach(f => {
                    const sev = f.severity || 'medium';
                    // Shorten message for readability
                    let msg = f.message || f.rule_id || '';
                    if (msg.length > 120) msg = msg.substring(0, 117) + '...';
                    html += `
                        <div class="finding ${sev}">
                            <div class="finding-header">${sev.toUpperCase()}</div>
                            <div class="finding-file">${f.file || ''}${f.line ? ':' + f.line : ''}</div>
                            <div class="finding-fix">${msg}</div>
                        </div>
                    `;
                });
            }

            // Trust section
            html += `
                <div style="margin-top:24px; padding:16px; background:#111; border-radius:8px; font-size:0.85rem; color:#888;">
                    <strong style="color:#aaa;">How we check:</strong> VibeSafe uses <a href="https://semgrep.dev" style="color:#4ade80;" target="_blank">Semgrep</a>, the same static analysis engine used by Snowflake, Dropbox, and Slack. We scan for <a href="https://owasp.org/www-project-top-ten/" style="color:#4ade80;" target="_blank">OWASP Top 10</a> vulnerabilities and <a href="https://www.w3.org/WAI/WCAG21/quickref/" style="color:#4ade80;" target="_blank">WCAG 2.1</a> accessibility standards — the same checklists that security auditors and ADA lawyers use.
                </div>
            `;

            // Light mode notice
            const scanMode = results.scan_mode || 'light';
            if (scanMode === 'light') {
                html += `
                    <div style="text-align:center; padding:16px; margin-top:24px; background:#111; border-radius:8px; color:#666; font-size:0.85rem;">
                        This was a quick scan (AI code patterns + secrets + accessibility).
                        For a full scan (500+ rules, dependency CVEs, config checks),
                        <a href="#" onclick="trackInstall();window.open(getInstallUrl())" style="color:#4ade80;">add VibeSafe to your repo</a>.
                    </div>
                `;
            }

            document.getElementById('results').innerHTML = html;
            document.getElementById('results').style.display = 'block';
        }

        function showError(msg) {
            stopWombat();
            document.getElementById('scanning').style.display = 'none';
            document.getElementById('scanBtn').disabled = false;

            const isTimeout = msg.includes('too large');
            const isNotFound = msg.includes('Could not clone');

            let html;
            if (isTimeout) {
                html = `
                    <div style="text-align:center; padding:24px; background:#1a1a1a; border:1px solid #333; border-radius:12px;">
                        <div style="font-size:1.5rem; margin-bottom:12px;">This repo needs a deeper scan</div>
                        <p style="color:#888; margin-bottom:16px;">Our free web scanner handles small-to-medium repos. For larger projects, install VibeSafe as a GitHub Action — it runs with full resources on every PR.</p>
                        <div style="background:#0a0a0a; padding:16px; border-radius:8px; text-align:left; margin-bottom:16px;">
                            <p style="color:#4ade80; font-size:0.9rem; margin-bottom:8px;">Copy this into your repo as .github/workflows/vibesafe.yml:</p>
                            <pre style="color:#ccc; font-size:0.8rem; overflow-x:auto; white-space:pre-wrap;">name: VibeSafe
on: [pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: vibesafeio/vibesafe-action@v0</pre>
                            <button class="copy-btn" onclick="navigator.clipboard.writeText(document.querySelector('#results pre').textContent).then(()=>{this.textContent='Copied!'})">Copy YAML</button>
                        </div>
                        <p style="color:#555; font-size:0.8rem;">Or <a href="https://github.com/vibesafeio/vibesafe-action" style="color:#4ade80;">view setup guide</a></p>
                    </div>
                `;
            } else if (isNotFound) {
                html = `
                    <div class="grade-box bad">
                        <div class="grade-letter">?</div>
                        <div class="grade-score">Repo not found</div>
                        <div class="grade-label">Check the URL and make sure the repo is public.</div>
                    </div>
                `;
            } else {
                html = `
                    <div class="grade-box bad">
                        <div class="grade-letter">!</div>
                        <div class="grade-score">Something went wrong</div>
                        <div class="grade-label">${msg}</div>
                    </div>
                `;
            }

            document.getElementById('results').innerHTML = html;
            document.getElementById('results').style.display = 'block';
        }

        function copyPrompt() {
            const text = document.getElementById('promptText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = 'Copy to clipboard'; }, 2000);
                fetch('/api/event?e=fix_copies');
            });
        }

        function trackInstall() { fetch('/api/event?e=install_clicks'); }

        function getInstallUrl() {
            const repoUrl = document.getElementById('repoUrl').value.trim();
            const match = repoUrl.match(/github\.com\/([^\/]+\/[^\/]+)/);
            if (!match) return 'https://github.com/vibesafeio/vibesafe-action';
            const yaml = `name: VibeSafe
on: [pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: vibesafeio/vibesafe-action@v0`;
            return `https://github.com/${match[1]}/new/main?filename=.github/workflows/vibesafe.yml&value=${encodeURIComponent(yaml)}`;
        }

        // Enter key support
        document.getElementById('repoUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startScan();
        });

        // Wombat burrow loading animation
        let wombatAnim = null;
        function startWombat() {
            const cv = document.getElementById('wombatCanvas');
            if (!cv) return;
            const cx = cv.getContext('2d');
            const S = 8;
            const col = {
                o:'#9B7B5E',m:'#B8967A',l:'#C9A88C',ll:'#D4B89A',
                dk:'#7A6347',vdk:'#5C4A36',eye:'#2C2216',nose:'#4A3C2E',
                grs:'#5D8035',grd:'#4A6B2A',dirt:'#3D3225',bg:'#0a0a0a'
            };
            function px(x,y,c){cx.fillStyle=c;cx.fillRect(x*S,y*S,S,S);}
            function ground(hX,hW,ph){
                for(let x=0;x<45;x++){
                    const h=x>=hX&&x<hX+hW;
                    px(x,14,(x%2==0)?col.grs:col.grd);
                    if(!h)px(x,15,(x%2==0)?col.grd:col.grs);
                    for(let y=16;y<20;y++){if(!h||y>16+ph)px(x,y,col.dirt);}
                }
            }
            function wombat(bx,by){
                const w=[[0,0,col.o],[1,0,col.o],[4,0,col.o],[5,0,col.o],
                [0,1,col.m],[1,1,col.l],[2,1,col.o],[3,1,col.o],[4,1,col.l],[5,1,col.m],
                [0,2,col.m],[1,2,col.l],[2,2,col.l],[3,2,col.l],[4,2,col.l],[5,2,col.m],[6,2,col.o],
                [0,3,col.o],[1,3,col.eye],[2,3,col.l],[3,3,col.l],[4,3,col.eye],[5,3,col.l],[6,3,col.m],[7,3,col.o],
                [0,4,col.m],[1,4,col.l],[2,4,col.nose],[3,4,col.nose],[4,4,col.l],[5,4,col.l],[6,4,col.m],[7,4,col.m],[8,4,col.o],
                [0,5,col.m],[1,5,col.l],[2,5,col.l],[3,5,col.l],[4,5,col.ll],[5,5,col.ll],[6,5,col.l],[7,5,col.m],[8,5,col.m],[9,5,col.o],
                [0,6,col.o],[1,6,col.m],[2,6,col.l],[3,6,col.ll],[4,6,col.ll],[5,6,col.ll],[6,6,col.ll],[7,6,col.l],[8,6,col.m],[9,6,col.m],[10,6,col.o],
                [0,7,col.o],[1,7,col.m],[2,7,col.m],[3,7,col.l],[4,7,col.ll],[5,7,col.ll],[6,7,col.l],[7,7,col.m],[8,7,col.m],[9,7,col.o],[10,7,col.o],
                [1,8,col.o],[2,8,col.o],[3,8,col.m],[4,8,col.m],[5,8,col.m],[6,8,col.m],[7,8,col.o],[8,8,col.o],
                [1,9,col.dk],[2,9,col.dk],[3,9,col.o],[4,9,col.o],[6,9,col.dk],[7,9,col.dk],
                [1,10,col.vdk],[2,10,col.vdk],[3,10,col.dk],[4,10,col.dk],[6,10,col.vdk],[7,10,col.vdk]];
                for(const p of w) px(bx+p[0],by+p[1],p[2]);
            }
            let bits=[], phase=0, wy=3, timer=0;
            function spawn(ox){
                for(let i=0;i<3;i++) bits.push({x:ox+Math.random()*4-2,y:12+Math.random()*2,vx:(Math.random()-0.5)*2,vy:-Math.random()*3-1,life:15+Math.floor(Math.random()*10),c:Math.random()>0.5?col.dk:col.o});
            }
            function draw(){
                cx.fillStyle=col.bg;cx.fillRect(0,0,360,160);
                ground(16,6,Math.min(phase,3));
                wombat(15,wy);
                for(let i=bits.length-1;i>=0;i--){
                    const d=bits[i];d.x+=d.vx;d.y+=d.vy;d.vy+=0.3;d.life--;
                    if(d.life>0&&d.y<20){cx.fillStyle=d.c;cx.fillRect(d.x*S,d.y*S,S*0.6,S*0.6);}
                    else bits.splice(i,1);
                }
                timer++;
                if(timer%8==0&&wy<10){wy+=0.5;phase=Math.min(phase+0.5,4);spawn(20);}
                if(wy>=10){wy=3;phase=0;}
                wombatAnim=requestAnimationFrame(draw);
            }
            draw();
            // Progress dots
            const dotsEl=document.getElementById('scanDots');
            dotsEl.innerHTML='';
            for(let i=0;i<5;i++){const d=document.createElement('div');d.className='scan-dot';d.id='sdot'+i;dotsEl.appendChild(d);}
            let di=0;
            wombatAnim._dotInterval=setInterval(()=>{for(let i=0;i<5;i++)document.getElementById('sdot'+i).style.background=i<=di?col.m:'#333';di=(di+1)%6;},300);
        }
        function stopWombat() {
            if(wombatAnim){cancelAnimationFrame(wombatAnim);if(wombatAnim._dotInterval)clearInterval(wombatAnim._dotInterval);wombatAnim=null;}
        }
    </script>
</body>
</html>
