name: "VibeSafe Security Scan"
description: "AI 생성 코드의 보안 취약점을 스캔하고 PR에 점수를 코멘트합니다."
author: "VibeSafe"

branding:
  icon: shield
  color: blue

inputs:
  path:
    description: "스캔할 소스 코드 경로 (기본값: 레포 루트)"
    required: false
    default: "."
  domain:
    description: "서비스 도메인 (ecommerce|game|platform|healthcare|fintech|education|auto)"
    required: false
    default: "auto"

outputs:
  score:
    description: "보안 점수 (0-100)"
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: "보안 등급 (A-F)"
    value: ${{ steps.scan.outputs.grade }}
  domain:
    description: "감지된 서비스 도메인"
    value: ${{ steps.scan.outputs.domain }}
  certified:
    description: "Certified 배지 발급 여부 (true/false)"
    value: ${{ steps.scan.outputs.certified }}
  critical:
    description: "Critical 취약점 수"
    value: ${{ steps.scan.outputs.critical }}
  high:
    description: "High 취약점 수"
    value: ${{ steps.scan.outputs.high }}
  medium:
    description: "Medium 취약점 수"
    value: ${{ steps.scan.outputs.medium }}
  low:
    description: "Low 취약점 수"
    value: ${{ steps.scan.outputs.low }}
  total:
    description: "전체 취약점 수"
    value: ${{ steps.scan.outputs.total }}
  certified_block_reason:
    description: "Certified 미발급 사유 (발급된 경우 빈 문자열)"
    value: ${{ steps.scan.outputs.certified_block_reason }}

runs:
  using: "docker"
  image: "docker://ghcr.io/vibesafeio/vibesafe-action:latest"
  env:
    INPUT_PATH: ${{ inputs.path }}
    INPUT_DOMAIN: ${{ inputs.domain }}
