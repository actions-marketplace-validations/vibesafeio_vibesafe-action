name: "VibeSafe Security Scan"
description: "Scan AI-generated code for security vulnerabilities and post results as PR comments."
author: "VibeSafe"

branding:
  icon: shield
  color: blue

inputs:
  path:
    description: "Source code path to scan (default: repo root)"
    required: false
    default: "."
  domain:
    description: "Service domain (ecommerce|game|platform|healthcare|fintech|education|auto)"
    required: false
    default: "auto"
  fail-on:
    description: "Fail the check (exit 1) when findings at this severity or above exist. Options: critical, high, medium, low, none. Default: critical"
    required: false
    default: "critical"
  custom-rules:
    description: "Additional Semgrep configs (comma-separated). Can be registry packs (p/react), local YAML paths, or URLs to custom rule files."
    required: false
    default: ""

outputs:
  score:
    description: "Security score (0-100)"
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: "Security grade (A-F)"
    value: ${{ steps.scan.outputs.grade }}
  domain:
    description: "Detected service domain"
    value: ${{ steps.scan.outputs.domain }}
  certified:
    description: "Whether Certified badge is issued (true/false)"
    value: ${{ steps.scan.outputs.certified }}
  critical:
    description: "Number of critical vulnerabilities"
    value: ${{ steps.scan.outputs.critical }}
  high:
    description: "Number of high vulnerabilities"
    value: ${{ steps.scan.outputs.high }}
  medium:
    description: "Number of medium vulnerabilities"
    value: ${{ steps.scan.outputs.medium }}
  low:
    description: "Number of low vulnerabilities"
    value: ${{ steps.scan.outputs.low }}
  total:
    description: "Total number of vulnerabilities"
    value: ${{ steps.scan.outputs.total }}
  certified_block_reason:
    description: "Reason for not issuing Certified badge (empty if certified)"
    value: ${{ steps.scan.outputs.certified_block_reason }}

runs:
  using: "docker"
  image: "docker://ghcr.io/vibesafeio/vibesafe-action:latest"
  env:
    INPUT_PATH: ${{ inputs.path }}
    INPUT_DOMAIN: ${{ inputs.domain }}
    INPUT_FAIL_ON: ${{ inputs.fail-on }}
    INPUT_CUSTOM_RULES: ${{ inputs.custom-rules }}
    GITHUB_TOKEN: ${{ github.token }}
