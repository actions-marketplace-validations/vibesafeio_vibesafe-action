rules:
  # ===== AI-Generated Code Common Vulnerabilities =====
  # These patterns appear frequently in vibe-coded apps but are not
  # well-covered by standard Semgrep packs.

  - id: vibesafe.hardcoded-cors-wildcard
    patterns:
      - pattern-either:
          - pattern: |
              Access-Control-Allow-Origin: "*"
          - pattern: |
              "Access-Control-Allow-Origin": "*"
          - pattern: |
              cors({origin: "*"})
          - pattern: |
              cors(origins="*")
          - pattern: |
              CORS(app, resources={..., "origins": "*"})
    message: >
      CORS is configured to allow all origins (*). This allows any website
      to make requests to your API, potentially exposing user data.
      Restrict origins to your frontend domain.
    languages: [python, javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      subcategory: [vuln]
      technology: [web]
      cwe: "CWE-942: Overly Permissive Cross-domain Whitelist"
      vibesafe-fix: "Restrict CORS origins to your frontend domain: cors({origin: 'https://yourdomain.com'})"

  - id: vibesafe.flask-debug-production
    pattern: app.run(..., debug=True, ...)
    message: >
      Flask app running with debug=True. This exposes the Werkzeug debugger
      which allows arbitrary code execution. Never use debug=True in production.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      subcategory: [vuln]
      cwe: "CWE-489: Active Debug Code"
      vibesafe-fix: "Use debug=os.environ.get('FLASK_DEBUG', 'false').lower() == 'true'"

  - id: vibesafe.jwt-no-expiry
    patterns:
      - pattern: jwt.encode($PAYLOAD, ...)
      - pattern-not: "jwt.encode({..., exp: ..., ...}, ...)"
    message: >
      JWT token created without expiration time. Tokens without expiry never
      become invalid, so a leaked token grants permanent access.
      Always include an 'exp' claim.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      subcategory: [vuln]
      cwe: "CWE-613: Insufficient Session Expiration"
      vibesafe-fix: "Add expiry: jwt.encode({...payload, 'exp': datetime.utcnow() + timedelta(hours=1)}, secret)"

  - id: vibesafe.express-no-helmet
    patterns:
      - pattern: |
          const app = express()
      - pattern-not-inside: |
          ...
          app.use(helmet())
          ...
    message: >
      Express app without Helmet middleware. Helmet sets security headers
      (CSP, HSTS, X-Frame-Options) that prevent common attacks.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      subcategory: [vuln]
      technology: [express]
      vibesafe-fix: "Install helmet: npm i helmet, then add app.use(helmet()) before routes"

  - id: vibesafe.password-comparison-timing-py
    patterns:
      - pattern-either:
          - pattern: |
              if $PASSWORD == $INPUT: ...
          - pattern: |
              if $INPUT == $PASSWORD: ...
    message: >
      Password compared using ==. This is vulnerable to timing attacks.
      Use a constant-time comparison function instead.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      subcategory: [vuln]
      cwe: "CWE-208: Observable Timing Discrepancy"
      vibesafe-fix: "Use hmac.compare_digest(password_hash, input_hash)"

  # DISABLED: password-comparison-timing-js catches ALL === comparisons, not just
  # password comparisons. FP rate ~99%. Re-enable when pattern can be narrowed to
  # variables named password/hash/secret/token.
  # - id: vibesafe.password-comparison-timing-js

  - id: vibesafe.supabase-anon-key-in-code
    pattern-regex: "eyJ[A-Za-z0-9_-]{30,}\\.eyJ[A-Za-z0-9_-]{30,}\\.[-A-Za-z0-9_]+"
    paths:
      include:
        - "*.ts"
        - "*.tsx"
        - "*.js"
        - "*.jsx"
    message: >
      Supabase anon/service key found in source code. While anon keys are
      meant to be public, service_role keys should never be in client code.
      Use environment variables for all Supabase keys.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      subcategory: [vuln]
      technology: [supabase]
      vibesafe-fix: "Move to env var: const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_ANON_KEY)"

  # ===== Accessibility (a11y) =====
  # AI-generated code almost never includes accessibility attributes.
  # 64% of ADA web accessibility lawsuits target companies under $25M revenue.

  - id: vibesafe.a11y-img-missing-alt
    pattern-regex: "<img\\s+(?!(?:[^>]*\\balt\\s*=))[^>]*/?>"
    paths:
      include:
        - "*.tsx"
        - "*.jsx"
      exclude:
        - "*test*"
        - "*spec*"
        - "*__tests__*"
    message: >
      Accessibility: <img> without alt attribute. Screen readers cannot describe
      this image to visually impaired users. This is a WCAG 2.1 Level A violation
      and a common basis for ADA lawsuits.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: accessibility
      subcategory: [a11y]
      cwe: "WCAG 2.1 — 1.1.1 Non-text Content (Level A)"
      vibesafe-fix: "Add alt text: <img alt=\"Description of image\" ... /> or alt=\"\" for decorative images"

  - id: vibesafe.a11y-input-missing-label
    pattern-regex: "<input\\s+(?![^>]*(?:aria-label|aria-labelledby))[^>]*(?:type\\s*=\\s*[\"'](?!hidden)[^\"']*[\"'])[^>]*/?>|<input\\s+(?![^>]*(?:aria-label|aria-labelledby|type\\s*=))[^>]*/?>|<textarea\\s+(?![^>]*(?:aria-label|aria-labelledby))[^>]*>"
    paths:
      include:
        - "*.tsx"
        - "*.jsx"
      exclude:
        - "*test*"
        - "*spec*"
    message: >
      Accessibility: Form input without aria-label or aria-labelledby.
      Screen readers cannot identify this field. WCAG 2.1 Level A violation.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: accessibility
      subcategory: [a11y]
      cwe: "WCAG 2.1 — 1.3.1 Info and Relationships (Level A)"
      vibesafe-fix: "Add aria-label: <input aria-label=\"Email address\" ... />"

  - id: vibesafe.a11y-html-missing-lang
    pattern-regex: "<html(?!\\s[^>]*\\blang\\s*=)[^>]*>"
    paths:
      include:
        - "*.html"
        - "*.tsx"
        - "*.jsx"
    message: >
      Accessibility: <html> without lang attribute. Screen readers use this to
      determine pronunciation. WCAG 2.1 Level A violation.
    languages: [html, typescript, javascript]
    severity: WARNING
    metadata:
      category: accessibility
      subcategory: [a11y]
      cwe: "WCAG 2.1 — 3.1.1 Language of Page (Level A)"
      vibesafe-fix: "Add lang attribute: <html lang=\"en\"> or <html lang=\"ko\">"

  # DISABLED: clickable-div-no-role — FP when role= appears after onClick.
  # Semgrep pattern-not-regex can't exclude within regex-matched text.
  # Re-enable when Semgrep adds proper JSX attribute matching.
