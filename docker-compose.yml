version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibesafe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibesafe
      POSTGRES_USER: vibesafe_user
      POSTGRES_PASSWORD: vibesafe_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibesafe_user -d vibesafe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vibesafe_redis
    restart: unless-stopped
    command: redis-server --requirepass vibesafe_dev_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vibesafe_dev_redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vibesafe_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vibesafe_minio_user
      MINIO_ROOT_PASSWORD: vibesafe_minio_password
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO 버킷 자동 생성
  minio_init:
    image: minio/mc:latest
    container_name: vibesafe_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vibesafe_minio_user vibesafe_minio_password;
      mc mb --ignore-existing local/vibesafe-uploads;
      mc mb --ignore-existing local/vibesafe-artifacts;
      mc anonymous set none local/vibesafe-uploads;
      mc anonymous set none local/vibesafe-artifacts;
      echo 'MinIO buckets created.';
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
